<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Modifya</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <div class="container">

      <a class="logo" href="#">Modifya</a>

      <input id="searchBar" type="text" placeholder="Search books..." />

      <button id="themeToggle" class="btn">☀️</button>

      <button id="menuToggle" class="menu-btn">☰</button>

    </div>
  </header>

  <!-- SIDEBAR -->
  <aside id="sidebar" class="sidebar">
    <a href="#">Self Improvement</a>
    <a href="#">Business (Coming Soon)</a>
    <a href="#">Psychology (Coming Soon)</a>
    <a href="#">Finance (Coming Soon)</a>
    <a href="#">Novels (Coming Soon)</a>
  </aside>

  <!-- OVERLAY -->
  <div id="overlay" class="overlay"></div>

  <!-- MAIN -->
  <main class="main">

    <h1>When life feels dull, the right books can change everything.</h1>

    <p>A simple library of self-improvement books coming soon.</p>

    <div class="card">
      Coming Soon
    </div>

    <button id="openModal">Popular Books</button>

  </main>

  <!-- MODAL -->
  <div id="modal" class="modal">
    <div class="modal-box">
      <h3>Popular Books</h3>
      <p>Coming Soon</p>
      <button id="closeModal">Close</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
